<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Face Tracker</h1>
    <p class="subtitle">Real-time face landmark tracking in your browser</p>
  </header>

  <main>
    <div class="stage">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <div id="recIndicator" class="rec-indicator" hidden>
        <span class="rec-dot"></span><span id="recTime">0:00</span>
      </div>
      <div id="status" class="status">Click “Start camera” to begin</div>
    </div>

    <div class="controls">
      <button id="startBtn">Start camera</button>
      <button id="stopBtn" disabled>Stop</button>
      <button id="recordBtn" class="record-btn" disabled>● Record</button>

      <label class="toggle">
        <input type="checkbox" id="meshToggle" checked />
        Face mesh
      </label>
      <label class="toggle">
        <input type="checkbox" id="boxToggle" checked />
        Bounding box
      </label>
      <label class="toggle">
        <input type="checkbox" id="mirrorToggle" checked />
        Mirror
      </label>
    </div>

    <div class="stats">
      <div class="stat"><span class="label">Faces</span><span id="faceCount">0</span></div>
      <div class="stat"><span class="label">FPS</span><span id="fps">0</span></div>
      <div class="stat blendshape">
        <span class="label">Smile</span>
        <div class="bar"><div id="smileBar" class="fill"></div></div>
      </div>
      <div class="stat blendshape">
        <span class="label">Left blink</span>
        <div class="bar"><div id="blinkLeftBar" class="fill"></div></div>
      </div>
      <div class="stat blendshape">
        <span class="label">Right blink</span>
        <div class="bar"><div id="blinkRightBar" class="fill"></div></div>
      </div>
    </div>
    <section class="gallery-section">
      <div class="gallery-header">
        <h2>Saved recordings</h2>
        <span id="galleryCount" class="gallery-count">0</span>
      </div>
      <p id="galleryEmpty" class="gallery-empty">
        No recordings yet. Start the camera and hit Record.
      </p>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <div id="playerModal" class="modal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-body">
      <button id="modalClose" class="modal-close" aria-label="Close">×</button>
      <video id="playerVideo" controls></video>
      <div id="playerMeta" class="player-meta"></div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
